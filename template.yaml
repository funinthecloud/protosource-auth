AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: protosource-auth - shadow-token auth service on Lambda

Globals:
  Function:
    Timeout: 10
    MemorySize: 256

Parameters:
  EventsTableName:
    Type: String
    Default: events
  AggregatesTableName:
    Type: String
    Default: aggregates
  KmsKeyArn:
    Type: String
    Description: Full KMS key ARN (e.g. arn:aws:kms:us-east-1:123456:key/abc-def)
  DomainName:
    Type: String
    Description: Custom domain name (e.g. auth.example.com)
  CertificateArn:
    Type: String
    Description: ACM certificate ARN for the custom domain (must be in same region for regional)
  HostedZoneId:
    Type: String
    Description: Route 53 hosted zone ID for the domain
  CorsOrigin:
    Type: String
    Default: ""
    Description: Allowed CORS origin for admin frontend (e.g. https://auth-admin.drhayt.com)
  AdminDomainName:
    Type: String
    Default: ""
    Description: Custom domain for admin SPA (e.g. auth-admin.drhayt.com). Leave empty to skip frontend infra.
  AdminCertificateArn:
    Type: String
    Default: ""
    Description: ACM certificate ARN for admin domain (must be in us-east-1 for CloudFront)
  AdminHostedZoneId:
    Type: String
    Default: ""
    Description: Route 53 hosted zone ID for admin domain

Conditions:
  HasAdminDomain: !Not [!Equals [!Ref AdminDomainName, ""]]

Resources:
  AuthFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: go1.x
    Properties:
      Handler: bootstrap
      Runtime: provided.al2023
      Architectures:
        - arm64
      CodeUri: ./cmd/protosource-auth-lambda/
      Environment:
        Variables:
          PROTOSOURCE_AUTH_EVENTS_TABLE: !Ref EventsTableName
          PROTOSOURCE_AUTH_AGGREGATES_TABLE: !Ref AggregatesTableName
          PROTOSOURCE_AUTH_KMS_KEY_ARN: !Ref KmsKeyArn
          PROTOSOURCE_AUTH_CORS_ORIGIN: !Ref CorsOrigin
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref EventsTableName
        - DynamoDBCrudPolicy:
            TableName: !Ref AggregatesTableName
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - kms:Encrypt
                - kms:Decrypt
              Resource: !Ref KmsKeyArn
      Events:
        ApiRoot:
          Type: Api
          Properties:
            Path: /
            Method: ANY
        ApiCatchAll:
          Type: Api
          Properties:
            Path: /{proxy+}
            Method: ANY

  ApiDomainName:
    Type: AWS::ApiGateway::DomainName
    Properties:
      DomainName: !Ref DomainName
      RegionalCertificateArn: !Ref CertificateArn
      EndpointConfiguration:
        Types:
          - REGIONAL

  ApiBasePathMapping:
    Type: AWS::ApiGateway::BasePathMapping
    DependsOn: ServerlessRestApiProdStage
    Properties:
      DomainName: !Ref ApiDomainName
      RestApiId: !Ref ServerlessRestApi
      Stage: Prod

  DnsRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt ApiDomainName.RegionalDomainName
        HostedZoneId: !GetAtt ApiDomainName.RegionalHostedZoneId

  # ── Admin Frontend (S3 + CloudFront) ──

  AdminBucket:
    Type: AWS::S3::Bucket
    Condition: HasAdminDomain
    Properties:
      BucketName: !Sub "${AdminDomainName}-site"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  AdminBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Condition: HasAdminDomain
    Properties:
      Bucket: !Ref AdminBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${AdminBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${AdminDistribution}"

  AdminOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Condition: HasAdminDomain
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${AdminDomainName}-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  AdminDistribution:
    Type: AWS::CloudFront::Distribution
    Condition: HasAdminDomain
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Aliases:
          - !Ref AdminDomainName
        ViewerCertificate:
          AcmCertificateArn: !Ref AdminCertificateArn
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt AdminBucket.RegionalDomainName
            OriginAccessControlId: !Ref AdminOAC
            S3OriginConfig:
              OriginAccessIdentity: ""
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
          Compress: true
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html

  AdminDnsRecord:
    Type: AWS::Route53::RecordSet
    Condition: HasAdminDomain
    Properties:
      HostedZoneId: !Ref AdminHostedZoneId
      Name: !Ref AdminDomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt AdminDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2  # CloudFront global hosted zone ID

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/"
  CustomDomainUrl:
    Description: Custom domain URL
    Value: !Sub "https://${DomainName}/"
  AuthFunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt AuthFunction.Arn
  AdminUrl:
    Condition: HasAdminDomain
    Description: Admin SPA URL
    Value: !Sub "https://${AdminDomainName}/"
  AdminBucketName:
    Condition: HasAdminDomain
    Description: S3 bucket for admin SPA assets
    Value: !Ref AdminBucket
  AdminDistributionId:
    Condition: HasAdminDomain
    Description: CloudFront distribution ID (for cache invalidation)
    Value: !Ref AdminDistribution
