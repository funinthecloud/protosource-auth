version = 0.1

[default.deploy.parameters]
stack_name = "protosource-auth"
resolve_s3 = true
s3_prefix = "protosource-auth"
capabilities = "CAPABILITY_IAM"
parameter_overrides = "EventsTableName=\"protosource-auth-events\" AggregatesTableName=\"protosource-auth-aggregates\" MasterKeyBase64=\"CHANGE_ME\" IssuerIss=\"https://auth.example.com\" DomainName=\"auth.example.com\" CertificateArn=\"arn:aws:acm:us-east-1:ACCOUNT:certificate/CHANGE_ME\" HostedZoneId=\"CHANGE_ME\""
image_repositories = []

[default.global.parameters]
region = "us-east-1"
